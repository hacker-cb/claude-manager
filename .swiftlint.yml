disabled_rules:
  - todo
  - trailing_comma
  # `String(decoding:as:)` is the correct non-failable API; the rule pushes the
  # failable initializer, which we don't want here.
  - optional_data_string_conversion
opt_in_rules:
  - empty_count
  - closure_spacing
  - explicit_init
  - first_where
  - sorted_first_last
  - contains_over_first_not_nil
  - redundant_nil_coalescing

excluded:
  - .build
  - .tmp-cache
  - build
  - DerivedData
  - dist
  - scripts
  - Sources/ClaudeManagerApp/Resources

line_length:
  warning: 160
  error: 200
  ignores_comments: true
  ignores_urls: true

function_body_length:
  warning: 80
  error: 140

type_body_length:
  warning: 320
  error: 450

file_length:
  warning: 500
  error: 800

identifier_name:
  min_length: 1
  max_length:
    warning: 50
    error: 60

cyclomatic_complexity:
  warning: 18
  error: 30

nesting:
  type_level: 2
