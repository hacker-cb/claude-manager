name: ClaudeManager
options:
  bundleIdPrefix: io.github.hacker-cb.claude-manager
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  ClaudeManagerCore:
    path: .
  # Auto-update. Sparkle 2 is the standard for Developer ID + notarized, non-App-Store
  # apps. Declared here (not in Package.swift) because the app target is built by
  # xcodebuild from this generated project, not by SwiftPM — Package.swift stays
  # core-only. XcodeGen embeds Sparkle.framework with a Sign-on-Copy phase, so the
  # release archive signs its nested helpers (Autoupdate, Updater.app, *.xpc) with the
  # same Developer ID identity + `--options runtime` (see scripts/build-app.sh).
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    # Version SSoT is the git tag. CI injects MARKETING_VERSION (from the v* tag) and
    # CURRENT_PROJECT_VERSION (from the run number) into the release build via
    # scripts/build-app.sh. These are dev placeholders for local/unsigned builds only —
    # do NOT bump them to cut a release; push a `vX.Y.Z` tag instead (docs/RELEASING.md).
    MARKETING_VERSION: "0.0.0"
    CURRENT_PROJECT_VERSION: "1"
    # Signing is supplied at release time via CI (Developer ID). Local/PR builds
    # pass CODE_SIGNING_ALLOWED=NO, so no team is required to compile.
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual

targets:
  ClaudeManager:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/ClaudeManagerApp
    dependencies:
      - package: ClaudeManagerCore
        product: ClaudeManagerCore
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.hacker-cb.claude-manager
        PRODUCT_NAME: Claude Manager
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Pavel Sokolov. MIT-licensed."
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
    info:
      path: Sources/ClaudeManagerApp/Resources/Info.plist
      properties:
        CFBundleName: Claude Manager
        CFBundleDisplayName: Claude Manager
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "14.0"
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "Copyright © 2026 Pavel Sokolov. MIT-licensed."
        # We activate/quit other Claude processes; the launcher scripts use System
        # Events. Declare the usage string so the one-time TCC prompt is legible.
        NSAppleEventsUsageDescription: "Claude Manager brings profile windows to the front and quits running profiles."
        # Sparkle auto-update. The appcast is served from a fixed gh-pages URL so
        # SUFeedURL never changes across releases (it is baked into every notarized
        # binary and unfixable post-ship). SUPublicEDKey is the base64 Ed25519 PUBLIC
        # key; Sparkle verifies every downloaded update against it. Generate the keypair
        # once with Sparkle's `bin/generate_keys` (private key → login Keychain, backed
        # up offline), paste the printed public key below, and store the exported private
        # key as the SPARKLE_ED_PRIVATE_KEY CI secret. scripts/build-app.sh fails the
        # release if this still holds the placeholder, so a build can never ship unsigned.
        SUFeedURL: "https://hacker-cb.github.io/claude-manager/appcast.xml"
        SUPublicEDKey: "c5fpSpOdyIhwZHAl5c1x59GLzSpRUB1ChnP2A5p5vrc="
        # The deep-link broker: declaring the claude:// scheme makes Claude Manager an
        # eligible default handler. It only *becomes* the default (and forwards links to
        # a chosen account) when the user enables the broker in Settings — off by default.
        CFBundleURLTypes:
          - CFBundleURLName: io.github.hacker-cb.claude-manager.claude
            CFBundleURLSchemes: [claude]
    entitlements:
      path: Sources/ClaudeManagerApp/Resources/ClaudeManager.entitlements
      properties:
        # Non-sandboxed by necessity: the app writes launcher bundles next to the
        # real Claude.app, runs lsregister/iconutil, and restarts the Dock —
        # none of which is possible inside the App Sandbox. Distribution is
        # Developer ID + notarization (never the App Store).
        #
        # Sparkle requires NO additional com.apple.security.cs.* exceptions here: those
        # (and SUEnableInstallerLauncherService / SUEnableDownloaderService) are for
        # SANDBOXED apps only. Do not add them — they are a known misconfiguration for a
        # non-sandboxed app. Sparkle's own nested binaries carry what they need.
        com.apple.security.app-sandbox: false
        com.apple.security.automation.apple-events: true
