name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Marketing version (e.g. 0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install tooling
        run: brew install xcodegen create-dmg

      - name: Resolve version
        id: version
        env:
          # Pass event data through env, never interpolate ${{ }} into the shell —
          # a crafted workflow_dispatch input must not become executable code.
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            V="$INPUT_VERSION"
          else
            V="${REF_NAME#v}"
          fi
          if ! printf '%s' "$V" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "Invalid version '$V' (allowed: letters, digits, . _ -)" >&2
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.DEVELOPER_ID_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Write App Store Connect API key
        env:
          AC_API_KEY_P8_BASE64: ${{ secrets.AC_API_KEY_P8_BASE64 }}
        run: |
          echo "$AC_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/ac_api_key.p8"

      - name: Build, sign, package, notarize
        id: package
        env:
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
          AC_API_KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          AC_API_ISSUER_ID: ${{ secrets.AC_API_ISSUER_ID }}
          AC_API_KEY_PATH: ${{ runner.temp }}/ac_api_key.p8
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          bash scripts/build-app.sh
          bash scripts/make-dmg.sh
          DMG="dist/ClaudeManager-${VERSION}.dmg"
          bash scripts/notarize.sh "$DMG"
          echo "dmg=$DMG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          VERSION: ${{ steps.version.outputs.version }}
          DMG: ${{ steps.package.outputs.dmg }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TAG="v$VERSION"
          else
            TAG="$REF_NAME"
          fi
          gh release create "$TAG" "$DMG" \
            --title "Claude Manager $VERSION" \
            --generate-notes

      - name: Clean up secrets
        if: always()
        run: rm -f "$RUNNER_TEMP/ac_api_key.p8"
