name: Label sync

on:
  push:
    branches: [master]
    paths: [".github/labels.yml"]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  labeler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crazy-max/ghaction-github-labeler@v5
        with:
          yaml-file: .github/labels.yml
          skip-delete: true
