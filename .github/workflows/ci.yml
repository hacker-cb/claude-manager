name: CI

# Gate every PR regardless of base (a slice PR may target an umbrella, not the
# trunk), and every push to the long-lived branches. Feature branches are already
# gated by their PR's synchronize event, so they need no push trigger.
on:
  pull_request:
  push:
    branches:
      - master
      - dev
      - "umbrella/**"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the formatter so a Homebrew stable bump can't silently change lint rules under
  # us (0.62 enabled wrapIfStatementBodies by default). Bump this deliberately, in step
  # with the Brewfile note and a local `brew upgrade swiftformat`.
  SWIFTFORMAT_VERSION: "0.62.1"
  # SHA-256 of that version's `swiftformat.zip` release asset — verified before the
  # binary runs, so a swapped/tampered asset fails the build. Update alongside the version.
  SWIFTFORMAT_SHA256: "7cb1cb1fae04932047c7015441c543848e8e60e1572d808d080e0a1f1661114a"

jobs:
  build-test-lint:
    runs-on: macos-15
    # The job normally finishes in ~3 minutes. A cap keeps a hang — e.g. a test that
    # blocks a runner's small worker pool on a subprocess — from burning the default
    # six hours before anyone notices it is stuck rather than slow.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (Swift 6 / Swift Testing)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install tooling
        run: brew install xcodegen swiftlint

      - name: Install SwiftFormat (pinned)
        run: |
          curl -fsSL --retry 3 --retry-delay 2 -o "$RUNNER_TEMP/swiftformat.zip" \
            "https://github.com/nicklockwood/SwiftFormat/releases/download/${SWIFTFORMAT_VERSION}/swiftformat.zip"
          echo "${SWIFTFORMAT_SHA256}  $RUNNER_TEMP/swiftformat.zip" | shasum -a 256 -c -
          unzip -oq "$RUNNER_TEMP/swiftformat.zip" -d "$RUNNER_TEMP/swiftformat"
          chmod +x "$RUNNER_TEMP/swiftformat/swiftformat"
          echo "$RUNNER_TEMP/swiftformat" >> "$GITHUB_PATH"
          "$RUNNER_TEMP/swiftformat/swiftformat" --version

      - name: Format check
        run: swiftformat --lint .

      - name: Lint
        run: swiftlint --strict

      - name: Test (headless core)
        run: swift test

      - name: Generate Xcode project
        run: xcodegen generate

      # Both configurations are built: Release is what ships, Debug is what `make run`
      # produces, and the two must keep SEPARATE macOS identities. That invariant lives in
      # per-config build settings rather than in code, so `swift test` cannot see it — the
      # assert step below is its only regression guard (see scripts/assert-build-identities.sh).
      - name: Build app (unsigned, Release — shipping identity)
        run: |
          xcodebuild build \
            -project ClaudeManager.xcodeproj \
            -scheme ClaudeManager \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Build app (unsigned, Debug — dev identity)
        run: |
          xcodebuild build \
            -project ClaudeManager.xcodeproj \
            -scheme ClaudeManager \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Assert dev and release identities stay isolated
        run: bash scripts/assert-build-identities.sh
